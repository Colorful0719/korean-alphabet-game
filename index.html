<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓文四十音、結合與尾音高階練習場</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <header class="bg-indigo-600 text-white shadow-md p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">한글 韓文智能練習場</h1>
            <div class="flex gap-2 text-sm">
                <span class="bg-indigo-700 px-3 py-1 rounded-full" id="score-display">得分: 0</span>
                <span class="bg-indigo-700 px-3 py-1 rounded-full" id="combo-display">連擊: 0</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-4 flex-grow flex flex-col justify-center gap-6">
        
        <div class="grid grid-cols-4 gap-1 bg-slate-200 p-1 rounded-xl shadow-inner text-xs md:text-sm">
            <button onclick="switchMode('vowels')" id="btn-vowels" class="mode-btn py-2 font-medium rounded-lg text-center bg-white text-indigo-600 shadow-sm transition-all">單純母音</button>
            <button onclick="switchMode('consonants')" id="btn-consonants" class="mode-btn py-2 font-medium rounded-lg text-center text-slate-600 hover:text-slate-950 transition-all">單純子音</button>
            <button onclick="switchMode('combine')" id="btn-combine" class="mode-btn py-2 font-medium rounded-lg text-center text-slate-600 hover:text-slate-950 transition-all">子母結合</button>
            <button onclick="switchMode('batchim')" id="btn-batchim" class="mode-btn py-2 font-medium rounded-lg text-center text-slate-600 hover:text-slate-950 transition-all">收音尾音</button>
        </div>

        <div class="bg-white border border-slate-100 rounded-2xl shadow-xl p-6 md:p-8 text-center flex flex-col gap-5 relative overflow-hidden">
            <div id="feedback-overlay" class="absolute inset-0 flex items-center justify-center text-6xl font-bold opacity-0 pointer-events-none transition-all duration-200"></div>
            
            <div>
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1" id="game-hint">請選出對應的羅馬拼音</span>
                
                <div class="flex items-center justify-center gap-4 my-2">
                    <div class="text-7xl font-bold text-slate-800" id="question-text">아</div>
                    <button onclick="speakCurrentWord()" class="p-2 rounded-full bg-indigo-50 hover:bg-indigo-100 text-indigo-600 transition-all shadow-sm" title="聽發音">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3" id="options-container">
                </div>

            <div id="explanation" class="text-sm text-slate-500 text-left min-h-[20px] bg-slate-50 p-3 rounded-lg hidden">
                </div>
        </div>

        <button id="next-btn" onclick="nextQuestion()" class="w-full bg-slate-800 text-white font-medium py-3 rounded-xl hover:bg-slate-900 transition-all shadow-md hidden">
            下一題 →
        </button>
    </main>

    <footer class="text-center p-4 text-xs text-slate-400">
        韓文智能練習場 · 支援發音與結合字練習
    </footer>

    <script>
        // 資料庫：擴充了「combine 子母結合」與「batchim 收尾音組合」
        const db = {
            vowels: [
                { char: 'ㅏ', rom: 'a' }, { char: 'ㅓ', rom: 'eo' }, { char: 'ㅗ', rom: 'o' }, { char: 'ㅜ', rom: 'u' },
                { char: 'ㅡ', rom: 'eu' }, { char: 'ㅣ', rom: 'i' }, { char: 'ㅐ', rom: 'ae' }, { char: 'ㅔ', rom: 'e' },
                { char: 'ㅑ', rom: 'ya' }, { char: 'ㅕ', rom: 'yeo' }, { char: 'ㅛ', rom: 'yo' }, { char: 'ㅠ', rom: 'yu' }
            ],
            consonants: [
                { char: 'ㄱ', rom: 'g/k' }, { char: 'ㄴ', rom: 'n' }, { char: 'ㄷ', rom: 'd/t' }, { char: 'ㄹ', rom: 'r/l' },
                { char: 'ㅁ', rom: 'm' }, { char: 'ㅂ', rom: 'b/p' }, { char: 'ㅅ', rom: 's' }, { char: 'ㅇ', rom: 'ng' },
                { char: 'ㅈ', rom: 'j' }, { char: 'ㅊ', rom: 'ch' }, { char: 'ㅋ', rom: 'k' }, { char: 'ㅌ', rom: 't' },
                { char: 'ㅍ', rom: 'p' }, { char: 'ㅎ', rom: 'h' }
            ],
            combine: [
                { char: '가', rom: 'ga', desc: 'ㄱ (g) + ㅏ (a) = ga (與中文的「咖」音近)' },
                { char: '노', rom: 'no', desc: 'ㄴ (n) + ㅗ (o) = no' },
                { char: '디', rom: 'di', desc: 'ㄷ (d) + ㅣ (i) = di (與中文的「低」音近)' },
                { char: '러', rom: 'reo', desc: 'ㄹ (r) + ㅓ (eo) = reo' },
                { char: '미', rom: 'mi', desc: 'ㅁ (m) + ㅣ (i) = mi (與中文的「米」音近)' },
                { char: '바', rom: 'ba', desc: 'ㅂ (b) + ㅏ (a) = ba (與中文的「巴」音近)' },
                { char: '수', rom: 'su', desc: 'ㅅ (s) + ㅜ (u) = su (與中文的「蘇」音近)' },
                { char: '주', rom: 'ju', desc: 'ㅈ (j) + ㅜ (u) = ju (與中文的「豬」音近)' },
                { char: '하', rom: 'ha', desc: 'ㅎ (h) + ㅏ (a) = ha (與中文的「哈」音近)' },
                { char: '캐', rom: 'kae', desc: 'ㅋ (k) + ㅐ (ae) = kae' }
            ],
            batchim: [
                { char: '학생', rom: 'hak-saeng', desc: '【학】的尾音是 ㄱ [k] 塞音，【생】的尾音是 ㅇ [ng] 鼻音。意為「學生」。' },
                { char: '한국', rom: 'han-guk', desc: '【한】的尾音是 ㄴ [n] 納音，【국】的尾音是 ㄱ [k] 塞音。意為「韓國」。' },
                { char: '김밥', rom: 'gim-bap', desc: '【김】的尾音是 ㅁ [m] 閉嘴音，【밥】的尾音是 ㅂ [p] 閉嘴塞音。意為「紫菜包飯」。' },
                { char: '물', rom: 'mul', desc: '【물】的尾音是 ㄹ [l] 捲舌音，舌尖需向上頂。意為「水」。' },
                { char: '옷', rom: 'ot', desc: '【옷】雖然底部的尾音是 ㅅ，但當尾音時一律發 [t] 憋氣音。意為「衣服」。' },
                { char: '받다', rom: 'bat-da', desc: '【받】的尾音是 ㄷ [t] 憋氣音。意為「收到、得到」。' },
                { char: '빵', rom: 'ppang', desc: '【빵】的雙子音 ㅃ 發緊音，尾音 ㅇ 發 [ng] 鼻音。意為「麵包」。' }
            ]
        };

        let currentMode = 'vowels';
        let currentQuestion = null;
        let score = 0;
        let combo = 0;
        let hasAnswered = false;

        // 切換模式
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.className = "mode-btn py-2 font-medium rounded-lg text-center text-slate-600 hover:text-slate-950 transition-all";
            });
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.className = "mode-btn py-2 font-medium rounded-lg text-center bg-white text-indigo-600 shadow-sm transition-all";
            
            combo = 0;
            document.getElementById('combo-display').innerText = `連擊: ${combo}`;
            nextQuestion();
        }

        // 獲取混淆選項
        function getOptions(correctItem, pool) {
            let options = [correctItem];
            while (options.length < 4 && options.length < pool.length) {
                const randomItem = pool[Math.floor(Math.random() * pool.length)];
                if (!options.some(o => o.rom === randomItem.rom)) {
                    options.push(randomItem);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        // 語音發音功能 (文字轉語音)
        function speakCurrentWord() {
            if (!currentQuestion) return;
            
            // 由於單純的子音（如 ㄱ, ㄴ）TTS很難單獨標準發音，通常會加上「ㅏ」或讀其名稱，
            // 這裡做一個防錯處理，讓單純子音也能順利發出基礎音，其餘直接唸出字元
            let textToSpeak = currentQuestion.char;
            if (currentMode === 'consonants') {
                // 如果是單純子音，我們將它加上母音 'ㅏ' 來模擬發音
                textToSpeak = currentQuestion.char + 'ㅏ';
            } else if (currentMode === 'batchim') {
                // 尾音模式下有些題目包含括號說明，我們只唸單字部分
                textToSpeak = currentQuestion.char.split(' ')[0];
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ko-KR'; // 設定為韓語
            utterance.rate = 0.8;     // 速度稍慢方便學習
            window.speechSynthesis.speak(utterance);
        }

        // 下一題
        function nextQuestion() {
            hasAnswered = false;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation').classList.add('hidden');
            
            const feedback = document.getElementById('feedback-overlay');
            feedback.className = "absolute inset-0 flex items-center justify-center text-6xl font-bold opacity-0 pointer-events-none transition-all duration-200";

            const pool = db[currentMode];
            currentQuestion = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('question-text').innerText = currentQuestion.char;
            
            // 自動為新題目發音 (選用：若想讓學習者先聽，可解開下一行註釋)
            // setTimeout(speakCurrentWord, 300);

            const options = getOptions(currentQuestion, pool);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.rom;
                btn.className = "opt-btn bg-slate-100 hover:bg-slate-200 text-slate-800 font-medium py-4 px-3 rounded-xl transition-all border border-slate-200/60 active:scale-98 text-base md:text-lg";
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        // 檢查答案
        function checkAnswer(selectedOpt, selectedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;

            const isCorrect = selectedOpt.rom === currentQuestion.rom;
            const feedback = document.getElementById('feedback-overlay');
            
            document.querySelectorAll('.opt-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === currentQuestion.rom) {
                    btn.classList.remove('bg-slate-100', 'hover:bg-slate-200');
                    btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600');
                }
            });

            // 答完題自動播放一次正確發音，加深印象
            speakCurrentWord();

            if (isCorrect) {
                score += 10 + Math.floor(combo / 3) * 2;
                combo++;
                feedback.innerText = "⭕";
                feedback.classList.add('bg-emerald-500/10', 'text-emerald-500', 'opacity-100');
            } else {
                combo = 0;
                feedback.innerText = "❌";
                feedback.classList.add('bg-rose-500/10', 'text-rose-500', 'opacity-100');
                selectedBtn.classList.remove('bg-slate-100');
                selectedBtn.classList.add('bg-rose-500', 'text-white', 'border-rose-600');
            }

            document.getElementById('score-display').innerText = `得分: ${score}`;
            document.getElementById('combo-display').innerText = `連擊: ${combo}`;

            // 顯示結構與拼音解說
            const expBox = document.getElementById('explanation');
            if (currentQuestion.desc) {
                expBox.innerText = currentQuestion.desc;
            } else {
                expBox.innerText = `正確答案是：${currentQuestion.char} → 讀音為 [ ${currentQuestion.rom} ]。`;
            }
            expBox.classList.remove('hidden');

            document.getElementById('next-btn').classList.remove('hidden');
        }

        window.onload = () => {
            nextQuestion();
        };
    </script>
</body>
</html>
